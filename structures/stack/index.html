<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>stack — datastruct-visual</title>
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="stack.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' fill='%2302b337'>{}</text></svg>">

</head>
<body>   
  <nav>
    <a class="nav-link" href="../../index.html">← back</a>
    <span class="nav-title" >stack</span>
  </nav>

  <div class="ds-layout">

    <div class="visualizer">
      <div class="panel-label">visualization</div>
      <div class="canvas-area" id="canvas"></div>
      <div class="controls">
        <input type="number" id="val-input" placeholder="0" min="0" max="999">
        <button id="btn-insert">push</button>
        <button id="btn-remove">pop</button>
        <button id="btn-clear">clear stack</button>
        <button id="btn-clear-output">clear output</button>
      </div>
      <div class="log-area" id="log"></div>
    </div>

    <div class="code-panel">
      <div class="panel-label">implementation</div>
      <div class="code-block" id="code-block">
        <div class="code-line" id="cl-class"><span class="kw">class</span> <span class="fn">Stack</span> {</div>
        <div class="code-line indent" id="cl-constructor">  <span class="kw">constructor</span>() {</div>
        <div class="code-line indent-2" id="cl-items">    <span class="kw">this</span>.items = [];</div>
        <div class="code-line indent">  }</div>
        <div class="code-line"> </div>
        <div class="code-line indent" id="cl-push">  <span class="fn">push</span>(val) {</div>
        <div class="code-line indent-2" id="cl-push-body">    <span class="kw">this</span>.items.<span class="fn">push</span>(val);</div>
        <div class="code-line indent">  }</div>
        <div class="code-line"> </div>
        <div class="code-line indent" id="cl-pop">  <span class="fn">pop</span>() {</div>
        <div class="code-line indent-2" id="cl-pop-check">    <span class="kw">if</span> (<span class="kw">this</span>.<span class="fn">isEmpty</span>()) <span class="kw">return</span> <span class="fn">null</span>;</div>
        <div class="code-line indent-2" id="cl-pop-body">    <span class="kw">return</span> <span class="kw">this</span>.items.<span class="fn">pop</span>();</div>
        <div class="code-line indent">  }</div>
        <div class="code-line"> </div>
        <div class="code-line indent" id="cl-isempty">  <span class="fn">isEmpty</span>() {</div>
        <div class="code-line indent-2" id="cl-isempty-body">    <span class="kw">return</span> <span class="kw">this</span>.items.length === <span class="fn">0</span>;</div>
        <div class="code-line indent">  }</div>
        <div class="code-line">}</div>
      </div>
    </div>

  </div>

  <script src="stack.js"></script>
</body>
</html>
