<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stack — datastruct-visual</title>
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="stack.css">
</head>
<body>

  <nav>
    <a href="../../index.html">← back</a>
    <span>stack</span>
  </nav>

  <div class="ds-layout">

    <div class="visualizer">
      <div class="panel-label">visualization</div>
      <div class="canvas-area" id="canvas"></div>
      <div class="controls">
        <input type="number" id="val-input" placeholder="0" min="0" max="999">
        <button id="btn-push">push</button>
        <button id="btn-pop">pop</button>
        <button id="btn-clear-stack">clear stack</button>
        <button id="btn-clear-output">clear output</button>
      </div>
      <div class="log-area" id="log"></div>
    </div>

    <div class="code-panel">
      <div class="panel-label">implementation</div>
      <div class="code-block" id="code-block"></div>
    </div>

  </div>

  <script src="stack.js"></script>
</body>
</html>
